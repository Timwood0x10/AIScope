<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AIScope</title>
    <script>
      // GitHub Pages 对任何非根路径的 SPA 路由会返回 404，
      // 所以我们先保存当前 pathname，再跳回根路径，React Router 会在那恢复路由。
      (function () {
        var l = window.location;
        var path = l.pathname + l.search + l.hash;
        sessionStorage.setItem('spa-redirect', path);

        // 从 pathname 推断 base path：https://user.github.io/REPO/sub -> /REPO/
        var parts = l.pathname.split('/').filter(Boolean);
        var base = parts.length > 0 ? '/' + parts[0] + '/' : '/';
        l.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
